<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Health Assistant</title>

    <style>
        body {
            background-color: pink;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            color: black;
            font-size: 50px;
            font-weight: 900;
            letter-spacing: 3px;
        }

        p {
            color: black;
            font-size: 22px;
            font-weight: bold;
        }

        .heart {
            color: red;
            font-size: 80px;
            animation: heartbeat 1s infinite;
        }

        /* Heart animation */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .box {
            background-color: black;
            color: white;
            padding: 20px;
            margin: 30px auto;
            width: 60%;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>

    <h1>AI HEALTH ASSISTANT</h1>

    <div class="box">
        Welcome to my AI Health Assistant Project.<br>
        This system helps users understand health information easily.
    </div>

    <p>Made with ❤️ using AI</p>

</div>

</body>
</html>
